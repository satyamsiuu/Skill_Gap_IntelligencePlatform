name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Cancel in-progress runs for the same branch (save CI minutes)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"
  PNPM_VERSION: "10.33.0"

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Job 1: Lint — ESLint across all workspace packages
  # ─────────────────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client (required for API ESLint type-checking)
        run: pnpm --filter @sgip/api exec prisma generate

      - name: Build @sgip/shared (required for import resolution)
        run: pnpm --filter @sgip/shared run build

      - name: Lint — API
        run: pnpm --filter @sgip/api exec eslint "{src,test}/**/*.ts"

      - name: Lint — Web
        run: pnpm --filter @sgip/web run lint

      - name: Format check (Prettier)
        run: pnpm --recursive run format:check

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 2: Typecheck — TypeScript compilation check (no emit)
  # ─────────────────────────────────────────────────────────────────────────────
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @sgip/api exec prisma generate

      - name: Build @sgip/shared
        run: pnpm --filter @sgip/shared run build

      - name: Typecheck — shared
        run: pnpm --filter @sgip/shared run typecheck

      - name: Typecheck — API
        run: pnpm --filter @sgip/api run typecheck

      - name: Typecheck — Web
        run: pnpm --filter @sgip/web run typecheck

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 3: Unit Tests — Jest across API (web tests added as they're written)
  # ─────────────────────────────────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @sgip/api exec prisma generate

      - name: Build @sgip/shared
        run: pnpm --filter @sgip/shared run build

      - name: Test — API (unit)
        run: pnpm --filter @sgip/api run test --passWithNoTests --ci --coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-api
          path: apps/api/coverage/
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 4: Build — Verify both apps produce a build artifact
  # Reports build time for regression tracking (SGIP-1.1.1.3 AC)
  # ─────────────────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @sgip/api exec prisma generate

      - name: Build @sgip/shared
        run: pnpm --filter @sgip/shared run build

      - name: Build — API
        id: build_api
        run: |
          start_time=$(date +%s)
          pnpm --filter @sgip/api run build
          end_time=$(date +%s)
          build_time=$((end_time - start_time))
          echo "api_build_time=${build_time}s" >> $GITHUB_OUTPUT
          echo "✅ API build: ${build_time}s"

      - name: Build — Web
        id: build_web
        run: |
          start_time=$(date +%s)
          pnpm --filter @sgip/web run build
          end_time=$(date +%s)
          build_time=$((end_time - start_time))
          echo "web_build_time=${build_time}s" >> $GITHUB_OUTPUT
          echo "✅ Web build: ${build_time}s"

      - name: Report build times
        run: |
          echo "## Build Times" >> $GITHUB_STEP_SUMMARY
          echo "| App | Build Time |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|-----------|" >> $GITHUB_STEP_SUMMARY
          echo "| API | ${{ steps.build_api.outputs.api_build_time }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Web | ${{ steps.build_web.outputs.web_build_time }} |" >> $GITHUB_STEP_SUMMARY

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 5: Architecture Boundaries — dependency-cruiser
  # Enforces the Module Boundary Law (ADR-001), AI Independence Law (ADR-002),
  # and AI Gateway Singleton Law (ADR-003) on every PR.
  # This is the ONLY mechanism preventing scoring from importing AI Gateway in CI.
  # ─────────────────────────────────────────────────────────────────────────────
  arch-boundaries:
    name: Architecture Boundaries
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @sgip/api exec prisma generate

      - name: Build @sgip/shared
        run: pnpm --filter @sgip/shared run build

      - name: Check architecture boundaries (dependency-cruiser)
        run: pnpm --filter @sgip/api run depcruise:check

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 6: Docker Build — verify images build cleanly (SGIP-1.3.2.1)
  # Does NOT push images — just validates the Dockerfiles build.
  # Image push happens only on merge to main (Job 7).
  # ─────────────────────────────────────────────────────────────────────────────
  docker-build:
    name: Docker Build (verify)
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          target: runner
          push: false
          tags: sgip-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Worker image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          target: worker
          push: false
          tags: sgip-worker:${{ github.sha }}
          cache-from: type=gha

      - name: Build Web image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: false
          tags: sgip-web:${{ github.sha }}
          cache-from: type=gha

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 7: Staging Deploy Gate — runs ONLY on push to main (SGIP-1.3.2.3)
  #
  # This job represents the full staging deployment pipeline.
  # It requires ALL previous jobs to pass before deploying.
  # Deployment approach: build → push → deploy (container registry + ECS/Cloud Run).
  #
  # To activate:
  # 1. Add secrets: REGISTRY_URL, REGISTRY_USERNAME, REGISTRY_PASSWORD, DEPLOY_KEY
  # 2. Uncomment the docker/login-action step
  # 3. Change push: false → push: true in the build-push-action steps
  # 4. Add your deployment command (aws ecs update-service, gcloud run deploy, etc.)
  # ─────────────────────────────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy → Staging
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test, build, arch-boundaries, docker-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: staging
      url: https://staging.sgip.app
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Uncomment when registry credentials are configured ──────────────────
      # - name: Login to container registry
      #   uses: docker/login-action@v3
      #   with:
      #     registry: ${{ secrets.REGISTRY_URL }}
      #     username: ${{ secrets.REGISTRY_USERNAME }}
      #     password: ${{ secrets.REGISTRY_PASSWORD }}

      # ── Uncomment and customize for your deployment target ──────────────────
      # - name: Build and push API image
      #   uses: docker/build-push-action@v6
      #   with:
      #     context: .
      #     file: apps/api/Dockerfile
      #     target: runner
      #     push: true
      #     tags: |
      #       ${{ secrets.REGISTRY_URL }}/sgip-api:latest
      #       ${{ secrets.REGISTRY_URL }}/sgip-api:${{ github.sha }}
      #     cache-from: type=gha
      #     cache-to: type=gha,mode=max

      # - name: Run database migrations (prisma migrate deploy)
      #   run: |
      #     docker run --rm \
      #       -e DATABASE_URL="${{ secrets.STAGING_DATABASE_URL }}" \
      #       ${{ secrets.REGISTRY_URL }}/sgip-api:${{ github.sha }} \
      #       node -e "require('./dist/main')" --migrate-only
      #   # Note: implement a proper migration-runner entrypoint, not --migrate-only

      # - name: Deploy to staging (example: ECS, Cloud Run, Fly.io)
      #   run: echo "Deploy step — configure per your infrastructure"

      - name: Staging deploy gate passed
        run: |
          echo "## Staging Deploy Gate" >> $GITHUB_STEP_SUMMARY
          echo "All CI gates passed. Ready to deploy to staging." >> $GITHUB_STEP_SUMMARY
          echo "Configure secrets and uncomment deployment steps to activate." >> $GITHUB_STEP_SUMMARY
          echo "Commit: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
