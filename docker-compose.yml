# SGIP — Docker Compose (Local Development)
# Ticket: SGIP-1.3.2.2
#
# Provides the full infrastructure stack for local development:
# - PostgreSQL 16 (with pgvector, pg_trgm, pgcrypto extensions)
# - Redis 7 (for BullMQ job queues and application cache)
# - Jaeger (OpenTelemetry trace visualizer — optional, for SGIP-1.3.1.2)
# - pgAdmin (optional, for database inspection)
#
# Usage:
#   Start core deps:  docker compose up -d postgres redis
#   Start with OTel:  docker compose --profile otel up -d
#   Start all:        docker compose --profile otel --profile tools up -d
#   Stop all:         docker compose down
#   Nuke volumes:     docker compose down -v  (⚠ destroys all data)
#
# The API and web apps are run locally via pnpm (not via compose in development).
# This file provides ONLY the backing services.
#
# Credentials here are for LOCAL DEV ONLY.
# Production secrets are managed via your secrets manager (Vault, AWS SM, etc.)

version: "3.9"

services:
  # ── PostgreSQL 16 ──────────────────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: sgip-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: sgip_dev
      POSTGRES_USER: sgip
      POSTGRES_PASSWORD: sgip_dev_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Init script: enables extensions (pgvector, pg_trgm, pgcrypto) on first boot
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/01_extensions.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sgip -d sgip_dev"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - sgip-net

  # ── Redis 7 ───────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: sgip-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    # Append-only persistence: survives container restart without full dump
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sgip-net

  # ── Jaeger (OTel trace UI) — profile: otel ─────────────────────────────────
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: sgip-jaeger
    restart: unless-stopped
    profiles: ["otel"]
    ports:
      - "16686:16686" # Jaeger UI
      - "4317:4317" # OTLP gRPC receiver
      - "4318:4318" # OTLP HTTP receiver (used by instrumentation.ts)
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    networks:
      - sgip-net

  # ── pgAdmin (DB GUI) — profile: tools ─────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: sgip-pgadmin
    restart: unless-stopped
    profiles: ["tools"]
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@sgip.local
      PGADMIN_DEFAULT_PASSWORD: pgadmin_dev
      PGADMIN_CONFIG_SERVER_MODE: "False"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - sgip-net

# ── Networks ──────────────────────────────────────────────────────────────────
networks:
  sgip-net:
    driver: bridge

# ── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
    name: sgip_postgres_dev
  redis_data:
    name: sgip_redis_dev
  pgadmin_data:
    name: sgip_pgadmin_dev
